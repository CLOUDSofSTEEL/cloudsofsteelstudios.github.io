<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Clouds of Steel Studios</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Teko:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d12;
            background-image: radial-gradient(circle at 50% 0%, #1f2235 0%, #0d0d12 60%);
            color: #e0e0e0;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Teko', sans-serif;
            font-size: 8em;
            margin: 0;
            color: #3182ce;
            line-height: 1;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
        }
        
        h2 {
            font-family: 'Teko', sans-serif;
            font-size: 2.5em;
            margin: 10px 0 20px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #8a96a8;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            background-color: transparent;
            color: #e0e0e0;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1em;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 1px solid #444;
        }
        .btn:hover {
            background-color: #1a1a24;
            border-color: #8a96a8;
            color: #ffffff;
        }

        .animate-up {
            opacity: 0;
            transform: translateY(30px);
            animation: driftUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes driftUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container animate-up">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you are looking for has been moved, deleted, or does not exist.</p>
        <a href="index.html" class="btn">Return to Homepage</a>
    </div>
</body>
</html>
