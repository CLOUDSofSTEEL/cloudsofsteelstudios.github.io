<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Clouds of Steel Studios</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d12;
            background-image: radial-gradient(circle at 50% 0%, #1f2235 0%, #0d0d12 60%);
            color: #e0e0e0;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            min-height: 100vh;
        }

        /* Cinematic Header */
        header {
            padding: 100px 20px 20px;
        }
        h1 {
            font-family: 'Teko', sans-serif;
            font-size: 4em;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
        }
        p.subtitle {
            font-size: 1.1em;
            color: #8a96a8;
            max-width: 600px;
            margin: 0 auto 30px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .container {
            padding: 20px 20px 80px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Frosted Glass Form Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: left;
        }

        /* Form Inputs Styling */
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8a96a8;
        }
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(0, 0, 0, 0.3);
            color: #ffffff;
            font-family: inherit;
            font-size: 1em;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 10px rgba(49, 130, 206, 0.3);
            background-color: rgba(0, 0, 0, 0.5);
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Cyber/Neon Style Button */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #2b6cb0;
            color: white;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1.1em;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(43, 108, 176, 0.3);
            border: 1px solid #3182ce;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #3182ce;
            box-shadow: 0 0 25px rgba(49, 130, 206, 0.6);
            transform: translateY(-2px);
        }
        
        /* Social Icons */
        .social-icon {
            color: #8a96a8;
            font-size: 1.8em;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .social-icon:hover {
            color: #ffffff;
            transform: translateY(-3px);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #8a96a8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Smooth Entry Animations */
        .animate-up {
            opacity: 0;
            transform: translateY(30px);
            animation: driftUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }

        @keyframes driftUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <header class="animate-up">
        <h1>Contact Us</h1>
        <p class="subtitle">Join the Team or Reach Out</p>
    </header>

    <div class="container animate-up delay-1">
        <div class="glass-card">
            <form action="https://formspree.io/f/xykndavv" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                
                <button type="submit" class="btn">Send Message</button>
            </form>
            
            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); text-align: center; display: flex; justify-content: center; gap: 40px;">
                <a href="https://www.youtube.com/@CloudsofSteelStudios" target="_blank" class="social-icon" title="YouTube">
                    <i class="fa-brands fa-youtube"></i>
                </a>
                <a href="https://x.com/Clouds_Of_Steel" target="_blank" class="social-icon" title="X / Twitter">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
            </div>
        </div>

        <div class="animate-up delay-2">
            <a href="index.html" class="back-link">← Return to Homepage</a>
        </div>
    </div>
</body>
</html>
